<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Showcase — Animations & Effects</title>
  <link rel="stylesheet" href="css/main.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>

  <header class="site-header">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M15.5 11.5A7 7 0 0 1 6.5 2.5a7 7 0 1 0 9 9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.42 1.42M13.36 13.36l1.42 1.42M3.22 14.78l1.42-1.42M13.36 4.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-css">CSS</span>
        <span class="logo-showcase">Showcase</span>
      </div>
      <p class="tagline">What's possible with modern CSS — working examples you can explore & copy</p>
    </div>
    <div class="header-glow"></div>
  </header>

  <main>
    <nav class="filters" id="filters" aria-label="Filter demos by category">
      <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="count-all"></span></button>
      <button class="filter-btn" data-filter="keyframe">Keyframe <span class="filter-count" id="count-keyframe"></span></button>
      <button class="filter-btn" data-filter="scroll">Scroll-Driven <span class="filter-count" id="count-scroll"></span></button>
      <button class="filter-btn" data-filter="3d">3D Transforms <span class="filter-count" id="count-3d"></span></button>
      <button class="filter-btn" data-filter="interactive">Interactive <span class="filter-count" id="count-interactive"></span></button>
      <button class="filter-btn" data-filter="one-div">One Div <span class="filter-count" id="count-one-div"></span></button>
    </nav>

    <div class="gallery" id="gallery" role="list"></div>
  </main>

  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-meta">
          <span class="modal-badge" id="modal-badge"></span>
          <h2 id="modal-title-text"></h2>
          <p id="modal-desc"></p>
          <div class="modal-tags" id="modal-tags"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close demo">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-tabs" role="tablist">
        <button class="tab-btn active" data-tab="preview" role="tab" aria-selected="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 5.5l2.5 1.5L5 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Preview
        </button>
        <button class="tab-btn" data-tab="code" role="tab" aria-selected="false">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4.5 4L1.5 7l3 3M9.5 4l3 3-3 3M7.5 2l-1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Source Code
        </button>
      </div>

      <div class="modal-body">
        <div class="tab-panel" id="tab-preview" role="tabpanel">
          <iframe id="demo-iframe" sandbox="allow-scripts" title="Demo Preview" loading="lazy"></iframe>
        </div>
        <div class="tab-panel hidden" id="tab-code" role="tabpanel">
          <div class="code-toolbar">
            <div class="code-subtabs" role="tablist" aria-label="Source language">
              <button class="subtab-btn active" data-subtab="css" role="tab" aria-selected="true">CSS</button>
              <button class="subtab-btn" data-subtab="html" role="tab" aria-selected="false">HTML</button>
            </div>
            <button class="copy-btn" id="copy-btn">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Copy
            </button>
          </div>
          <pre class="code-block" id="code-block-css"><code id="code-css"></code></pre>
          <pre class="code-block hidden" id="code-block-html"><code id="code-html"></code></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/demos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
